<!DOCTYPE html>
<html>
<head>
    <title>Manage Programs</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        .container{
            width: 80%;
            margin: auto;
            padding: 30px;
        }

        .card{
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        input, textarea{
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button{
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
        }

        .delete-btn{
            background: red;
        }

        .back-btn{
            background: #333;
        }

    </style>
</head>

<body>

<div class="container">

    <a href="/dashboard">
        <button class="back-btn">
            ⬅ Back to Dashboard
        </button>
    </a>

    <h1>Manage Programs</h1>

    <div class="card">

        <form action="/add_program" method="POST">

            <input type="text"
                   name="name"
                   placeholder="Program Name"
                   required>

            <br><br>

            <textarea name="description"
                      placeholder="Program Description"
                      required>
            </textarea>

            <br><br>

            <button type="submit">
                Add Program
            </button>

        </form>

    </div>

    {% for program in programs %}

    <div class="card">

        <h3>{{ program[1] }}</h3>
        <p>{{ program[2] }}</p>

        <a href="/delete_program/{{ program[0] }}">
            <button class="delete-btn">
                Delete
            </button>
        </a>

    </div>

    {% endfor %}

</div>

</body>
</html>
