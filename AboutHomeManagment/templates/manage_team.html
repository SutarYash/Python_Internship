<!DOCTYPE html>
<html>
<head>
    <title>Manage Team Members</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        .container{
            width: 80%;
            margin: auto;
            padding: 30px;
        }

        .card{
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        input{
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        img{
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
        }

        button{
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
        }

        .delete-btn{
            background: red;
        }

        .back-btn{
            background: #333;
        }

    </style>
</head>

<body>

<div class="container">

    <a href="/dashboard">
        <button class="back-btn">
            ⬅ Back to Dashboard
        </button>
    </a>

    <h1>Manage Team Members</h1>

    <div class="card">

        <form action="/add_team_member"
              method="POST"
              enctype="multipart/form-data">

            <input type="text"
                   name="name"
                   placeholder="Member Name"
                   required>

            <br><br>

            <input type="text"
                   name="role"
                   placeholder="Member Role"
                   required>

            <br><br>

            <input type="file"
                   name="image"
                   required>

            <br><br>

            <button type="submit">
                Add Member
            </button>

        </form>

    </div>

    {% for member in team %}

    <div class="card">

        <img src="{{ url_for('static',
        filename='uploads/' + member[3]) }}">

        <h3>{{ member[1] }}</h3>
        <p>{{ member[2] }}</p>

        <a href="/delete_team_member/{{ member[0] }}">
            <button class="delete-btn">
                Delete
            </button>
        </a>

    </div>

    {% endfor %}

</div>

</body>
</html>
