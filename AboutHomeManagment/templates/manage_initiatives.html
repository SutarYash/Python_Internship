<!DOCTYPE html>
<html>
<head>
    <title>Manage Initiatives</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <h1>Manage Initiatives</h1>
</header>

<div class="container">

    <!-- Form Section -->
    <section>

        <form method="POST">

            <input type="text"
                   name="title"
                   placeholder="Initiative Title"
                   required>

            <br><br>

            <textarea
                name="description"
                placeholder="Description"
                required>
            </textarea>

            <br><br>

            <button type="submit">
                Save
            </button>

        </form>

    </section>

    <!-- Saved Initiatives -->
    <section>

        <h2>Saved Initiatives</h2>

        {% for item in initiatives %}

        <div class="card">

            <h3>{{ item[1] }}</h3>
            <p>{{ item[2] }}</p>

            <a href="/delete-initiative/{{ item[0] }}">
                <button type="button">
                    Delete
                </button>
            </a>

        </div>

        {% endfor %}

    </section>

    <a href="/dashboard">
        <button type="button">
            Back to Dashboard
        </button>
    </a>

</div>

</body>
</html>
