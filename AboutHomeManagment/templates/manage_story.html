<!DOCTYPE html>
<html>
<head>
    <title>Manage Our Story</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .container{
            width: 80%;
            margin: auto;
            padding: 30px;
        }

        .card{
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h1{
            text-align: center;
            color: #333;
        }

        textarea{
            width: 100%;
            height: 120px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button{
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover{
            opacity: 0.9;
        }

        .delete-btn{
            background: red;
        }

        .back-btn{
            background: #333;
        }

        p{
            line-height: 1.6;
        }

    </style>
</head>

<body>

    <div class="container">

        <a href="/dashboard">
            <button class="back-btn">
                ⬅ Back to Dashboard
            </button>
        </a>

        <h1>Manage Our Story</h1>

        <div class="card">

            <form action="/add_story" method="POST">

                <textarea
                    name="content"
                    placeholder="Enter story content..."
                    required>
                </textarea>

                <br><br>

                <button type="submit">
                    Add Story
                </button>

            </form>

        </div>

        <h2>All Stories</h2>

        {% for story in stories %}

        <div class="card">

            <p>{{ story[1] }}</p>

            <a href="/delete_story/{{ story[0] }}">
                <button class="delete-btn">
                    Delete
                </button>
            </a>

        </div>

        {% endfor %}

    </div>

</body>
</html>
