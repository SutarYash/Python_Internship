<!DOCTYPE html>
<html>
<head>
    <title>Manage Vision & Mission</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <h1>Manage Vision & Mission</h1>
</header>

<div class="container">

    <!-- Form -->
    <section>

        <form method="POST">

            <input type="text"
                   name="vision_title"
                   placeholder="Vision Title"
                   required>

            <br><br>

            <textarea
                name="vision_description"
                placeholder="Vision Description"
                required>
            </textarea>

            <br><br>

            <input type="text"
                   name="mission_title"
                   placeholder="Mission Title"
                   required>

            <br><br>

            <textarea
                name="mission_description"
                placeholder="Mission Description"
                required>
            </textarea>

            <br><br>

            <button type="submit">
                Save
            </button>

        </form>

    </section>

    <!-- Saved Vision -->
    <section>

        <h2>Saved Vision & Mission</h2>

        {% for item in vision_data %}

        <div class="card">

            <h3>{{ item[1] }}</h3>
            <p>{{ item[2] }}</p>

            <h3>{{ item[3] }}</h3>
            <p>{{ item[4] }}</p>

            <a href="/delete-vision/{{ item[0] }}">
                <button type="button">
                    Delete
                </button>
            </a>

        </div>

        {% endfor %}

    </section>

    <a href="/dashboard">
        <button type="button">
            Back to Dashboard
        </button>
    </a>

</div>

</body>
</html>
