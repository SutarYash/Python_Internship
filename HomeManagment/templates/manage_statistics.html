<!DOCTYPE html>
<html>
<head>
    <title>Manage Statistics</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <h1>Manage Statistics</h1>
</header>

<div class="container">

    <!-- Form -->
    <section>

        <form method="POST">

            <input type="text"
                   name="label"
                   placeholder="Statistic Label"
                   required>

            <br><br>

            <input type="text"
                   name="value"
                   placeholder="Statistic Value"
                   required>

            <br><br>

            <button type="submit">
                Save
            </button>

        </form>

    </section>

    <!-- Saved Statistics -->
    <section>

        <h2>Saved Statistics</h2>

        {% for stat in statistics %}

        <div class="card">

            <h3>{{ stat[1] }}</h3>
            <p>{{ stat[2] }}</p>

            <a href="/delete-statistics/{{ stat[0] }}">
                <button type="button">
                    Delete
                </button>
            </a>

        </div>

        {% endfor %}

    </section>

    <a href="/dashboard">
        <button type="button">
            Back to Dashboard
        </button>
    </a>

</div>

</body>
</html>
